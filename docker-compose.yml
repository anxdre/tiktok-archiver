version: '3.8'

services:
  # Main Nuxt application
  app:
    build: .
    container_name: tiktok-archiver-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./downloads:/app/downloads
      - ./archives:/app/archives
      - ./jobs:/app/jobs
      - ./storage:/app/storage
    restart: unless-stopped
    networks:
      - tiktok-network

  # Redis service for BullMQ job queue
  redis:
    image: redis:7-alpine
    container_name: tiktok-archiver-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - tiktok-network
    command: redis-server --appendonly yes

networks:
  tiktok-network:
    driver: bridge

volumes:
  redis-data:
